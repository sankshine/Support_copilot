version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-3-small}
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - POSTGRES_URL=postgresql://copilot:copilot@postgres:5432/support_copilot
      - REDIS_URL=redis://redis:6379
      - MIN_CONFIDENCE_SUBMIT=${MIN_CONFIDENCE_SUBMIT:-0.60}
      - MIN_CONFIDENCE_AUTOAPPROVE=${MIN_CONFIDENCE_AUTOAPPROVE:-0.80}
    depends_on:
      - chromadb
      - postgres
      - redis
    volumes:
      - ./config:/app/config:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:0.4.24
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: support_copilot
      POSTGRES_USER: copilot
      POSTGRES_PASSWORD: copilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped

  # Grafana dashboard for routing metrics
  grafana:
    image: grafana/grafana:10.0.0
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  chroma_data:
  postgres_data:
  grafana_data:
